<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form - Yusuf Electronics Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="container">
        <div class="logo">
            
            <img src="LOGO.png" alt="Yusuf Electronics Logo" class="logo-img">
            <span class="logo-text">Yusuf Electronics</span>
        </div>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </label>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="terms.html">Terms</a></li>
                <li><a href="order.html">Order</a></li>
            </ul>
        </nav>
    </div>
</header>

    <section class="order-form">
        <div class="container">
            <h1>Place Your Order</h1>
            <p style="text-align:center; margin-bottom:30px;">Fill in your details and contact us to complete your order.</p>
            
            <form id="orderForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="e.g., 0775123456">
                </div>
                <div class="form-group">
                    <label for="product">Select Product *</label>
                    <select id="product" name="product" required>
                        <option value="">-- Choose a product --</option>
                        <option value="Smartphone X200">Spark30C - UGX 400,000</option>
                        <option value="Smartphone Y20">Galaxy A16 - UGX 720,000</option>
                        <option value="ProBook 15 Laptop">ProBook 15 Laptop - UGX 1,200,000</option>
                        <option value="UltraBook 14 Laptop">UltraBook 14 Laptop - UGX 2,500,000</option>
                        <option value="BoomBox BT Speaker">BoomBox BT Speaker - UGX 180,000</option>
                        <option value="BassPro Headphones">Headsets - UGX 80,000</option>
                        <option value="Fast Charger 65W">Fast Charger 65W - UGX 20,000</option>
                        <option value="USB Type-C Cable">USB Type-C Cable - UGX 10,000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity *</label>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="message">Additional Message (optional)</label>
                    <textarea id="message" name="message" placeholder="Any special requests..."></textarea>
                </div>
                <button type="submit" class="btn">Submit Order</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <h2>Yusuf Electronics Center</h2>
            <div class="footer-info">
                <div>
                    <h3>Location</h3>
                    <p>Buwama Town</p>
                </div>
                <div>
                    <h3>Email</h3>
                    <p>buwamaelectronics.@gmail.ug.com</p>
                </div>
                <div>
                    <h3>Contacts</h3>
                    <p>0775060279 / 0741929024</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
